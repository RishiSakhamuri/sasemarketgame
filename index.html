<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-friendly: scales to phone width and blocks pinch-zoom weirdness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SASE Market Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <!-- Landing page. Two paths:
       - "Host a Game"  -> the projector/laptop screen (the game brain)
       - "Join a Game"  -> a team's phone (a simple controller)         -->
  <main class="landing">
    <h1 class="brand">SASE Market Game</h1>
    <p class="tagline">A live stock-market simulation. Diversify, survive the
      curveball, and finish on top.</p>

    <div class="landing-buttons">
      <!-- These are just links to the two screens. -->
      <a class="btn btn-primary btn-xl" href="host.html">Host a Game</a>
      <a class="btn btn-ghost btn-xl" href="player.html">Join a Game</a>
    </div>

    <p class="hint">
      <strong>Projector?</strong> Click <em>Host a Game</em>.<br />
      <strong>On your phone?</strong> Click <em>Join a Game</em>.
    </p>
  </main>
</body>
</html>
